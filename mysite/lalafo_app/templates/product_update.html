<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить объявление</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .form-header h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-header p {
            color: #666;
            font-size: 1rem;
        }

        form p {
            margin-bottom: 25px;
        }

        form label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        form input[type="text"],
        form input[type="number"],
        form input[type="tel"],
        form input[type="email"],
        form input[type="file"],
        form textarea,
        form select {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        form input:focus,
        form textarea:focus,
        form select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        form textarea {
            min-height: 120px;
            resize: vertical;
        }

        form input[type="file"] {
            padding: 12px;
            cursor: pointer;
            background: white;
        }

        form input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-right: 15px;
            transition: all 0.3s ease;
        }

        form input[type="file"]::file-selector-button:hover {
            transform: scale(1.05);
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }

        .submit-btn,
        .back-btn {
            flex: 1;
            padding: 16px 30px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .back-btn-wrapper {
            flex: 1;
        }

        .back-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
            width: 100%;
        }

        .back-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .back-btn:active {
            transform: translateY(-1px);
        }

        .helptext {
            display: block;
            color: #999;
            font-size: 0.85rem;
            margin-top: 5px;
            font-style: italic;
        }

        .errorlist {
            list-style: none;
            color: #f5576c;
            background: #ffe5e9;
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .errorlist li {
            margin: 0;
        }

        /* Стили для checkbox и radio */
        form input[type="checkbox"],
        form input[type="radio"] {
            width: auto;
            margin-right: 8px;
            cursor: pointer;
            transform: scale(1.2);
        }

        @media (max-width: 768px) {
            .form-container {
                padding: 35px 25px;
            }

            .form-header h1 {
                font-size: 1.8rem;
            }

            .button-group {
                flex-direction: column;
            }

            .submit-btn,
            .back-btn {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            .form-container {
                padding: 30px 20px;
            }

            .form-header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>📝 Изменить объявление</h1>
            <p>Заполните форму для создания нового товара</p>
        </div>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="button-group">
                <button type="submit" class="submit-btn">💾 Сохранить</button>
                <div class="back-btn-wrapper">
                    <a href="{% url 'product_list' %}" class="back-btn">⬅️ Назад</a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
